<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validar Candidatos · Panel de Administración</title>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (versión estándar) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
   * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #f0f4fa;
  padding: 32px 40px;
  color: #474747; /* texto principal */
}

.validation-container {
  max-width: 1200px;
  margin: 0 auto;
}

/* Header */
.page-header {
  margin-bottom: 28px;
}

.page-header h1 {
  font-size: 32px;
  font-weight: 600;
  color: #0e312d;
}

.page-header p {
  color: #474747;
  font-size: 16px;
  margin-top: 6px;
}

/* Contador */
.counter-row {
  display: flex;
  align-items: center;
  gap: 16px;
  background: white;
  padding: 12px 28px;
  border-radius: 60px;
  width: fit-content;
  border: 1px solid #c2914f33;
  margin-bottom: 32px;
  box-shadow: 0 4px 10px -6px rgba(0,40,100,0.1);
}

.counter-number {
  background: #0e312d;
  color: white;
  border-radius: 40px;
  padding: 6px 18px;
  font-weight: 700;
  font-size: 22px;
}

/* Grid de tarjetas */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 22px;
}

.candidate-card {
  background: white;
  border-radius: 24px;
  border: 1px solid #c2914f33;
  padding: 22px;
  transition: 0.15s;
  box-shadow: 0 8px 18px -12px #0e312d33;
}

.candidate-card:hover {
  border-color: #c2914f;
  box-shadow: 0 14px 24px -14px #0e312d66;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.candidate-name {
  font-size: 18px;
  font-weight: 700;
  color: #0e312d;
}

.status-badge {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 30px;
}

.status-badge.pendiente {
  background: #fef3d2;
  border: 1px solid #c2914f;
  color: #c2914f;
}

.status-badge.aprobada {
  background: #0e312d;
  color: white;
}

.status-badge.rechazada {
  background: #931935;
  color: white;
}

.details-compact {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 16px 0 18px;
  font-size: 14px;
}

.detail-line {
  display: flex;
}

.detail-line .tag {
  width: 85px;
  color: #474747;
  font-weight: 500;
}

.detail-line .value {
  font-weight: 500;
  color: #0e312d;
}

.action-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-top: 1px solid #c2914f33;
  padding-top: 18px;
}

.btn {
  border-radius: 30px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: none;
  background: white;
  border: 1px solid #c2914f33;
  color: #474747;
  cursor: pointer;
  transition: 0.1s;
}

.btn i {
  color: #0e312d;
}

.btn-approve {
  background: #0e312d;
  border: 1px solid #0e312d;
  color: white;
}

.btn-approve i {
  color: white;
}

.btn-reject {
  background: white;
  border: 1px solid #931935;
  color: #931935;
}

.btn-reject i {
  color: #931935;
}

/* ===== MODAL PRINCIPAL ===== */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(3px);
}

.modal.active {
  display: flex;
}

.modal-content {
  background: white;
  border-radius: 32px;
  max-width: 700px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px 36px;
  box-shadow: 0 30px 50px rgba(0,20,60,0.4);
  position: relative;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.modal-header h2 {
  font-size: 26px;
  font-weight: 600;
  color: #0e312d;
}

.close-modal {
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  color: #474747;
}

.subheader {
  color: #474747;
  margin-bottom: 20px;
  padding-left: 16px;
  border-left: 4px solid #0e312d;
  font-size: 14px;
}

.candidate-detail {
  margin-top: 10px;
}

.detail-section {
  background: #f8fcff;
  border-radius: 20px;
  padding: 22px;
  border: 1px solid #c2914f33;
  margin: 20px 0;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 30px;
  margin-bottom: 18px;
}

.field .label {
  font-size: 12px;
  color: #474747;
  text-transform: uppercase;
  font-weight: 600;
}

.field .value {
  font-weight: 600;
  font-size: 16px;
  margin-top: 5px;
  color: #0e312d;
}

.contact-row {
  display: flex;
  align-items: center;
  gap: 18px;
  background: white;
  border-radius: 50px;
  padding: 12px 24px;
  margin: 20px 0;
  border: 1px solid #c2914f33;
}

.desc-box {
  background: #eef4fd;
  border-radius: 16px;
  padding: 16px 20px;
  border-left: 6px solid #0e312d;
  margin: 22px 0;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 16px;
  margin-top: 30px;
}

.btn-large {
  padding: 12px 32px;
  border-radius: 40px;
  font-weight: 600;
  font-size: 16px;
  border: none;
  cursor: pointer;
  transition: 0.15s;
}

.btn-approve-large {
  background: #0e312d;
  color: white;
}

.btn-approve-large:hover {
  background: #0c2420;
}

.btn-reject-large {
  background: white;
  border: 1.5px solid #931935;
  color: #931935;
}

.btn-reject-large:hover {
  background: #fce6e8;
}

.id-chip {
  background: #c2914f33;
  padding: 5px 16px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  color: #0e312d;
}

.doc-badge {
  background: #c2914f33;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  display: inline-block;
  color: #0e312d;
}

  </style>
</head>
<body>

  <div class="validation-container">
    <!-- Header con iconos estándar -->


    <!-- CONTADOR con icono estándar -->
    <div class="counter-row">
      <span><i class="far fa-clock"></i> CANDIDATOS PENDIENTES</span>
      <span class="counter-number">4</span>
    </div>

    <!-- TARJETAS DE CANDIDATOS -->
    <div class="cards-grid" id="candidateCards">
      <!-- las tarjetas se generan con JS -->
    </div>
  </div>

  <!-- ===== MODAL ÚNICO (detalle candidato) ===== -->
  <div class="modal" id="candidateModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="far fa-id-card" style="margin-right: 10px;"></i> Información del candidato</h2>
        <button class="close-modal" id="closeModalBtn">&times;</button>
      </div>
      <div class="subheader">
        <i class="fas fa-info-circle"></i> Revise todos los datos antes de aprobar o rechazar
      </div>

      <!-- los detalles se inyectan dinámicamente -->
      <div id="modalDynamicContent"></div>

      <div class="modal-actions" id="modalActions">
        <!-- los botones se generan con JS -->
      </div>
    </div>
  </div>

  <!-- ===== MODAL PARA CONFIRMAR APROBAR/RECHAZAR ===== -->
  <div class="modal" id="confirmModal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <h3 style="margin-bottom: 16px;" id="confirmTitle"><i class="fas fa-question-circle"></i> ¿Aprobar candidato?</h3>
      <p id="confirmMessage" style="margin-bottom: 24px; color:#3d5277;">El candidato será aprobado y podrá postularse a vacantes.</p>
      <div style="display: flex; gap: 12px; justify-content: center;">
        <button class="btn" id="confirmCancel"><i class="fas fa-times"></i> Cancelar</button>
        <button class="btn-approve" id="confirmAction" style="padding:10px 30px;"><i class="fas fa-check"></i> Sí, aprobar</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- BASE DE DATOS DE CANDIDATOS (4 pendientes) ----------
      const candidates = [
        {
          id: 1,
          name: "Ana María González López",
          idEstudiante: "A01234567",
          carrera: "Ingeniería en Sistemas Computacionales",
          egreso: "2024",
          correo: "ana.gonzalez@universidad.edu",
          telefono: "+52 123 456 7890",
          fechaNacimiento: "15/03/2001",
          direccion: "Av. Universidad 123",
          ciudad: "Ciudad de México",
          educacion: "Licenciatura en Ingeniería en Sistemas",
          promedio: "9.2",
          idiomas: "Español, Inglés B2",
          documentos: "CV, Título, Cédula",
          fechaRegistro: "10 de enero, 2026",
          estado: "Pendiente"
        },
        {
          id: 2,
          name: "Carlos Alberto Ramírez Torres",
          idEstudiante: "A02345678",
          carrera: "Licenciatura en Administración de Empresas",
          egreso: "2023",
          correo: "carlos.ramirez@universidad.edu",
          telefono: "+52 098 765 4321",
          fechaNacimiento: "10/08/2000",
          direccion: "Calle Principal 456",
          ciudad: "Monterrey",
          educacion: "Licenciatura en Administración",
          promedio: "8.7",
          idiomas: "Español, Inglés B1",
          documentos: "CV, Título",
          fechaRegistro: "12 de enero, 2026",
          estado: "Pendiente"
        },
        {
          id: 3,
          name: "María Fernanda Herrera Castro",
          idEstudiante: "A03456789",
          carrera: "Ingeniería Industrial",
          egreso: "2025",
          correo: "maria.herrera@universidad.edu",
          telefono: "+52 555 123 4567",
          fechaNacimiento: "22/11/2002",
          direccion: "Av. Tecnológico 789",
          ciudad: "Guadalajara",
          educacion: "Licenciatura en Ingeniería Industrial",
          promedio: "9.5",
          idiomas: "Español, Inglés C1",
          documentos: "CV, Título, Certificado",
          fechaRegistro: "15 de enero, 2026",
          estado: "Pendiente"
        },
        {
          id: 4,
          name: "Jorge Luis Martínez Sánchez",
          idEstudiante: "A04567890",
          carrera: "Licenciatura en Contaduría Pública",
          egreso: "2024",
          correo: "jorge.martinez@universidad.edu",
          telefono: "+52 444 987 6543",
          fechaNacimiento: "05/05/2001",
          direccion: "Calle Universidad 321",
          ciudad: "Puebla",
          educacion: "Licenciatura en Contaduría",
          promedio: "8.9",
          idiomas: "Español",
          documentos: "CV, Título",
          fechaRegistro: "18 de enero, 2026",
          estado: "Pendiente"
        }
      ];

      const cardsGrid = document.getElementById('candidateCards');
      const modal = document.getElementById('candidateModal');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const modalDynamic = document.getElementById('modalDynamicContent');
      const modalActions = document.getElementById('modalActions');

      const confirmModal = document.getElementById('confirmModal');
      const confirmTitle = document.getElementById('confirmTitle');
      const confirmMessage = document.getElementById('confirmMessage');
      const confirmCancel = document.getElementById('confirmCancel');
      const confirmActionBtn = document.getElementById('confirmAction');

      let currentCandidateId = null;
      let currentAction = null; // 'approve' o 'reject'

      // ---------- RENDERIZAR TARJETAS ----------
      function renderCards() {
        cardsGrid.innerHTML = '';
        candidates.forEach(candidate => {
          const card = document.createElement('div');
          card.className = 'candidate-card';
          card.dataset.id = candidate.id;
          card.innerHTML = `
            <div class="card-header">
              <span class="candidate-name"><i class="fas fa-graduation-cap" style="margin-right: 6px; color:#1e3a8a;"></i>${candidate.name}</span>
              <span class="status-badge"><i class="far fa-hourglass"></i> PENDIENTE</span>
            </div>
            <div class="details-compact">
              <div class="detail-line"><span class="tag"><i class="fas fa-book" style="margin-right: 4px;"></i>CARRERA</span><span class="value">${candidate.carrera.substring(0,25)}${candidate.carrera.length > 25 ? '…' : ''}</span></div>
              <div class="detail-line"><span class="tag"><i class="fas fa-calendar-alt" style="margin-right: 4px;"></i>EGRESO</span><span class="value">${candidate.egreso}</span></div>
              <div class="detail-line"><span class="tag"><i class="far fa-envelope" style="margin-right: 4px;"></i>CORREO</span><span class="value">${candidate.correo}</span></div>
              <div class="detail-line"><span class="tag"><i class="fas fa-phone-alt" style="margin-right: 4px;"></i>TELÉFONO</span><span class="value">${candidate.telefono}</span></div>
              <div class="detail-line"><span class="tag"><i class="far fa-calendar" style="margin-right: 4px;"></i>REGISTRO</span><span class="value">${candidate.fechaRegistro}</span></div>
            </div>
            <div class="action-buttons">
              <button class="btn btn-detail" data-id="${candidate.id}"><i class="far fa-eye"></i> Ver detalle</button>
              <button class="btn btn-approve btn-aprobar" data-id="${candidate.id}"><i class="fas fa-check-circle"></i> Aprobar</button>
              <button class="btn btn-reject btn-rechazar" data-id="${candidate.id}"><i class="fas fa-times-circle"></i> Rechazar</button>
            </div>
          `;
          cardsGrid.appendChild(card);
        });

        // asignar eventos a los botones de cada tarjeta
        document.querySelectorAll('.btn-detail').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = parseInt(btn.dataset.id);
            openDetailModal(id);
          });
        });

        document.querySelectorAll('.btn-aprobar').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = parseInt(btn.dataset.id);
            currentCandidateId = id;
            currentAction = 'approve';
            confirmTitle.innerHTML = '<i class="fas fa-question-circle"></i> ¿Aprobar candidato?';
            confirmMessage.innerText = 'El candidato será aprobado y podrá postularse a vacantes.';
            confirmActionBtn.innerHTML = '<i class="fas fa-check"></i> Sí, aprobar';
            confirmActionBtn.className = 'btn-approve';
            confirmModal.classList.add('active');
          });
        });

        document.querySelectorAll('.btn-rechazar').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = parseInt(btn.dataset.id);
            currentCandidateId = id;
            currentAction = 'reject';
            confirmTitle.innerHTML = '<i class="fas fa-question-circle"></i> ¿Rechazar candidato?';
            confirmMessage.innerText = 'El candidato no será aprobado. Se notificará el motivo.';
            confirmActionBtn.innerHTML = '<i class="fas fa-ban"></i> Sí, rechazar';
            confirmActionBtn.className = 'btn-reject';
            confirmModal.classList.add('active');
          });
        });
      }

      // ---------- ABRIR MODAL DE DETALLE ----------
      function openDetailModal(id) {
        const candidate = candidates.find(c => c.id === id);
        if (!candidate) return;

        currentCandidateId = id;

        // construir html dinámico
        modalDynamic.innerHTML = `
          <div class="candidate-detail">
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap;">
              <span style="font-weight:600; font-size:18px;"><i class="fas fa-graduation-cap" style="margin-right: 8px; color:#1e3a8a;"></i>${candidate.name}</span>
              <span class="id-chip"><i class="fas fa-id-card" style="margin-right: 4px;"></i> ID: ${candidate.idEstudiante}</span>
            </div>

            <div class="detail-section">
              <div class="grid-2">
                <div class="field"><span class="label"><i class="fas fa-user"></i> NOMBRE</span><div class="value">${candidate.name}</div></div>
                <div class="field"><span class="label"><i class="fas fa-id-card"></i> ID ESTUDIANTE</span><div class="value">${candidate.idEstudiante}</div></div>
                <div class="field"><span class="label"><i class="fas fa-birthday-cake"></i> FECHA NAC.</span><div class="value">${candidate.fechaNacimiento}</div></div>
                <div class="field"><span class="label"><i class="fas fa-phone-alt"></i> TELÉFONO</span><div class="value">${candidate.telefono}</div></div>
              </div>
              <div class="field" style="margin-top:12px;"><span class="label"><i class="fas fa-envelope"></i> CORREO</span><div class="value">${candidate.correo}</div></div>
              <div class="grid-2" style="margin-top:12px;">
                <div class="field"><span class="label"><i class="fas fa-map-marker-alt"></i> DIRECCIÓN</span><div class="value">${candidate.direccion}</div></div>
                <div class="field"><span class="label"><i class="fas fa-city"></i> CIUDAD</span><div class="value">${candidate.ciudad}</div></div>
              </div>
            </div>

            <div class="detail-section">
              <div class="grid-2">
                <div class="field"><span class="label"><i class="fas fa-graduation-cap"></i> CARRERA</span><div class="value">${candidate.carrera}</div></div>
                <div class="field"><span class="label"><i class="fas fa-calendar-check"></i> EGRESO</span><div class="value">${candidate.egreso}</div></div>
                <div class="field"><span class="label"><i class="fas fa-university"></i> EDUCACIÓN</span><div class="value">${candidate.educacion}</div></div>
                <div class="field"><span class="label"><i class="fas fa-star"></i> PROMEDIO</span><div class="value">${candidate.promedio}</div></div>
              </div>
              <div class="grid-2" style="margin-top:12px;">
                <div class="field"><span class="label"><i class="fas fa-language"></i> IDIOMAS</span><div class="value">${candidate.idiomas}</div></div>
                <div class="field"><span class="label"><i class="fas fa-file-alt"></i> DOCUMENTOS</span><div class="value">${candidate.documentos}</div></div>
              </div>
            </div>

            <div class="contact-row">
              <i class="fas fa-calendar-plus" style="font-size:20px; color:#1e3a8a;"></i>
              <div><strong>Fecha de registro:</strong> ${candidate.fechaRegistro}</div>
            </div>
          </div>
        `;

        // botones del modal (Aprobar / Rechazar)
        modalActions.innerHTML = `
          <button class="btn-large btn-reject-large" id="modalRejectBtn"><i class="fas fa-times-circle"></i> Rechazar</button>
          <button class="btn-large btn-approve-large" id="modalApproveBtn"><i class="fas fa-check-circle"></i> Aprobar</button>
        `;

        modal.classList.add('active');

        // eventos botones dentro del modal detalle
        document.getElementById('modalRejectBtn').addEventListener('click', () => {
          modal.classList.remove('active');
          currentAction = 'reject';
          confirmTitle.innerHTML = '<i class="fas fa-question-circle"></i> ¿Rechazar candidato?';
          confirmMessage.innerText = 'El candidato no será aprobado. Se notificará el motivo.';
          confirmActionBtn.innerHTML = '<i class="fas fa-ban"></i> Sí, rechazar';
          confirmActionBtn.className = 'btn-reject';
          confirmModal.classList.add('active');
        });

        document.getElementById('modalApproveBtn').addEventListener('click', () => {
          modal.classList.remove('active');
          currentAction = 'approve';
          confirmTitle.innerHTML = '<i class="fas fa-question-circle"></i> ¿Aprobar candidato?';
          confirmMessage.innerText = 'El candidato será aprobado y podrá postularse a vacantes.';
          confirmActionBtn.innerHTML = '<i class="fas fa-check"></i> Sí, aprobar';
          confirmActionBtn.className = 'btn-approve';
          confirmModal.classList.add('active');
        });
      }

      // CERRAR MODAL DE DETALLE
      closeModalBtn.addEventListener('click', () => {
        modal.classList.remove('active');
      });

      // CERRAR SI SE CLICK FUERA DEL MODAL
      window.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
        if (e.target === confirmModal) confirmModal.classList.remove('active');
      });

      // CONFIRMACIÓN
      confirmCancel.addEventListener('click', () => {
        confirmModal.classList.remove('active');
      });

      confirmActionBtn.addEventListener('click', () => {
        if (!currentCandidateId || !currentAction) return;

        alert(`Candidato ${currentAction === 'approve' ? 'APROBADO' : 'RECHAZADO'} (ID: ${currentCandidateId}) - simulación`);

        // Eliminar el candidato del array
        const index = candidates.findIndex(c => c.id === currentCandidateId);
        if (index !== -1) candidates.splice(index, 1);

        // re-renderizar tarjetas y cerrar modales
        renderCards();
        confirmModal.classList.remove('active');
        modal.classList.remove('active');
      });

      // Inicializar
      renderCards();
    })();
  </script>
</body>
</html>
