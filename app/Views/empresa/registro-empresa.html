<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Empresa</title>

<link rel="stylesheet" href="/public/css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<div class="layout">

    <main class="main-content" style="margin-left:0; width:100%;">
        
        <div class="page-header">
            <h1>Registro de Empresa</h1>
            <p>Complete la información para registrar su empresa en UT Oriental Emplea</p>
        </div>

        <div class="card">

            <div class="card-header">
                <h2 class="card-title">
                    <i class="fas fa-building"></i>
                    Datos de la empresa
                </h2>
            </div>

            <form action="/registro-empresa" method="POST">

                <div class="grid grid-2">

                    <div class="form-group">
                        <label class="form-label">
                            Nombre de la empresa <span class="required">*</span>
                        </label>
                        <input type="text" name="empresa" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Giro de la empresa <span class="required">*</span>
                        </label>
                        <input type="text" name="giro" class="form-control" required>
                    </div>

                </div>

                <div class="grid grid-2">

                    <div class="form-group">
                        <label class="form-label">
                            Tipo de empresa <span class="required">*</span>
                        </label>
                        <select name="tipo_empresa" class="form-control" required>
                            <option value="">Seleccionar</option>
                            <option value="Privada">Privada</option>
                            <option value="Publica">Pública</option>
                            <option value="Mixta">Mixta</option>
                            <option value="ONG">ONG</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Teléfono <span class="required">*</span>
                        </label>
                        <input type="tel" name="telefono" class="form-control" required>
                    </div>

                </div>

                <div class="form-group">
                    <label class="form-label">
                        Dirección <span class="required">*</span>
                    </label>
                    <input type="text" name="direccion" class="form-control" required>
                </div>

                <h3 style="margin-top:2rem; color:var(--verde);">
                    Datos de acceso
                </h3>

                <div class="accent-strip mb-3"></div>

                <div class="grid grid-2">

                    <div class="form-group">
                        <label class="form-label">
                            Correo electrónico <span class="required">*</span>
                        </label>
                        <input type="email" name="correo" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Contraseña <span class="required">*</span>
                        </label>

                        <input 
                        type="password"
                        name="password"
                        class="form-control"
                        required
                        minlength="8"
                        pattern="(?=.*[A-Z])(?=.*[0-9])(?=.*[\W]).{8,}"
                        title="Debe tener al menos 8 caracteres, una mayúscula, un número y un símbolo">

                        <small style="color:var(--texto-gris)">
                        La contraseña debe tener mínimo 16 caracteres, una mayúscula, un número y un símbolo.
                        </small>

                    </div>

                </div>

                <h3 style="margin-top:2rem; color:var(--verde);">
                    Contacto de Recursos Humanos
                </h3>

                <div class="accent-strip mb-3"></div>

                <div class="grid grid-2">

                    <div class="form-group">
                        <label class="form-label">
                            Nombre del responsable <span class="required">*</span>
                        </label>
                        <input type="text" name="responsable_rrhh" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Teléfono de RR.HH.
                        </label>
                        <input type="tel" name="telefono_rrhh" class="form-control">
                    </div>

                </div>

                <div class="form-group">
                    <label class="form-label">
                        Correo de RR.HH.
                    </label>
                    <input type="email" name="correo_rrhh" class="form-control">
                </div>

                <div class="d-flex gap-2 justify-between">

                    <a href="login.html" class="btn btn-outline">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i>
                        Registrar empresa
                    </button>

                </div>

            </form>

        </div>

    </main>

</div>

</body>
</html>
