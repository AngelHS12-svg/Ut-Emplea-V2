<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Empresa</title>
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-briefcase"></i>
                    <div>
                        <div class="sidebar-title">UT Oriental Emplea</div>
                        <div class="sidebar-subtitle">Empresa</div>
                    </div>
                </div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="empresa-inicio.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="empresa-publicar.html"><i class="fas fa-plus-circle"></i> Publicar vacante</a></li>
                <li><a href="empresa-consultar.html"><i class="fas fa-search"></i> Consultar vacantes</a></li>
                <li><a href="empresa-estadisticas.html"><i class="fas fa-chart-bar"></i> Estadísticas</a></li>
                <li><a href="empresa-perfil.html" class="active"><i class="fas fa-building"></i> Perfil de empresa</a></li>
            </ul>
            <div class="sidebar-footer">
                <button class="btn-logout"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Perfil de la Empresa</h1>
                <p>Información general y datos de contacto de la empresa</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-building"></i> Datos de la empresa</h2>
                </div>
                <form>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Nombre de la empresa / organización <span class="required">*</span></label>
                            <input type="text" class="form-control" value="Empresa Ejemplo S.A. de C.V.">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Giro de la empresa <span class="required">*</span></label>
                            <input type="text" class="form-control" value="Tecnología de la información">
                        </div>
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Tipo de empresa <span class="required">*</span></label>
                            <select class="form-control">
                                <option>Privada</option>
                                <option>Pública</option>
                                <option>Mixta</option>
                                <option>ONG</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Teléfono <span class="required">*</span></label>
                            <input type="text" class="form-control" value="555-1234-5678">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Dirección <span class="required">*</span></label>
                        <input type="text" class="form-control" value="Av. Universidad 123, Ciudad Universitaria">
                    </div>

                    <h3 style="margin-top: 2rem; color: var(--verde);">Datos de acceso y contacto</h3>
                    <div class="accent-strip mb-3"></div>

                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" value="********">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Nombre del director o jefe de RR.HH.</label>
                            <input type="text" class="form-control" value="Juan Pérez García">
                        </div>
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Teléfono de Recursos Humanos</label>
                            <input type="text" class="form-control" value="555-8765-4321">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Correo electrónico de RR.HH.</label>
                            <input type="email" class="form-control" value="rrhh@empresa.com">
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-end">
                        <button type="button" class="btn btn-outline">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
