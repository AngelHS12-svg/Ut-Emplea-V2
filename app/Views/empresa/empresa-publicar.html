<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar vacante</title>
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <!-- mismo sidebar que en inicio -->
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-briefcase"></i>
                    <div>
                        <div class="sidebar-title">UT Oriental Emplea</div>
                        <div class="sidebar-subtitle">Empresa</div>
                    </div>
                </div>
            </div>
            <ul class="sidebar-nav">
                <li><a href="empresa-inicio.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="empresa-publicar.html" class="active"><i class="fas fa-plus-circle"></i> Publicar vacante</a></li>
                <li><a href="empresa-consultar.html"><i class="fas fa-search"></i> Consultar vacantes</a></li>
                <li><a href="empresa-estadisticas.html"><i class="fas fa-chart-bar"></i> Estadísticas</a></li>
                <li><a href="empresa-perfil.html"><i class="fas fa-building"></i> Perfil de empresa</a></li>
            </ul>
            <div class="sidebar-footer">
                <button class="btn-logout"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>Registro de Vacante</h1>
                <p>Formulario administrativo para publicación de vacantes empresariales</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title"><i class="fas fa-briefcase"></i> Datos de la Vacante</h2>
                </div>
                <form>
                    <div class="form-group">
                        <label class="form-label">Perfil solicitado <span class="required">*</span></label>
                        <input type="text" class="form-control" placeholder="Ej: Ingeniero, Administrador, Diseñador">
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Número de vacantes disponibles <span class="required">*</span></label>
                            <input type="number" class="form-control" value="1">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Nombre del puesto <span class="required">*</span></label>
                            <input type="text" class="form-control" placeholder="Título del puesto vacante">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Breve descripción del puesto <span class="required">*</span></label>
                        <textarea class="form-control" placeholder="Describa las principales funciones y responsabilidades del puesto..."></textarea>
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Experiencia requerida</label>
                            <input type="text" class="form-control" placeholder="Ej: 2 años, Sin experiencia, 5+ años">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Escolaridad necesaria</label>
                            <input type="text" class="form-control" placeholder="Ej: Licenciatura, Maestría, Técnico">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Requerimientos del cargo <span class="required">*</span></label>
                        <textarea class="form-control" placeholder="Conocimientos, habilidades y competencias necesarias..."></textarea>
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Horario de trabajo</label>
                            <input type="text" class="form-control" placeholder="Ej: Lun–Vie 9:00–18:00">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Lugar de trabajo</label>
                            <input type="text" class="form-control" placeholder="Ciudad o modalidad (presencial / remoto)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Rango de salario y prestaciones</label>
                        <input type="text" class="form-control" value="$15,000 – $20,000 MXN mensuales + prestaciones de ley">
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label">Sexo, edad y estado civil</label>
                            <input type="text" class="form-control" placeholder="Indistinto / Especificar requisitos (opcional)">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fecha de entrevista</label>
                            <input type="date" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fecha de vencimiento de la vacante <span class="required">*</span></label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="d-flex gap-2 justify-end">
                        <button type="button" class="btn btn-outline">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar registro</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
