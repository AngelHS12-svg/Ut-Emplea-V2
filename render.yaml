services:
  - type: web
    name: ut-emplea-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app
    disk:
      name: cv-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ut-emplea-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: ut-emplea-db
    databaseName: bolsa_trabajo_uto
    user: admin
